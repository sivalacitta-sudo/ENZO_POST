services:
  # Backend API Service
  - type: web
    name: blog-api
    env: node
    region: oregon
    plan: free
    buildCommand: cd server && npm install && npx nest build
    startCommand: cd server && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DB_TYPE
        value: postgres
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /api/health
