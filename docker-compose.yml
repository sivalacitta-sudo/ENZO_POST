version: '3.8'

services:
  # MySQL Database (Production)
  mysql:
    image: mysql:8.0
    container_name: blog-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-blog_cms}
      MYSQL_USER: ${DB_USERNAME:-blog_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - blog-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: blog-server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_TYPE=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USERNAME=${DB_USERNAME:-blog_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - DB_DATABASE=${DB_DATABASE:-blog_cms}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - JWT_EXPIRES_IN=7d
      - PORT=3000
      - FRONTEND_URL=http://localhost
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - blog-network
    volumes:
      - ./server/data:/app/data

  # Frontend Client
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: blog-client
    restart: unless-stopped
    depends_on:
      - server
    networks:
      - blog-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: blog-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - client
      - server
    networks:
      - blog-network

volumes:
  mysql-data:
    driver: local

networks:
  blog-network:
    driver: bridge
